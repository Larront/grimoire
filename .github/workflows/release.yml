name: release

on:
  push:
    tags: ["v*"]

# Allow tauri-action to create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf

      - uses: oven-sh/setup-bun@v2

      # Installs rustup + a default toolchain. The actual build runs in
      # src-tauri/, which pins channel 1.96.0 via rust-toolchain.toml; rustup
      # auto-installs that toolchain (with the host target) on first use there.
      # No `targets:` here on purpose — this action adds targets to the toolchain
      # IT installs (stable) and does not read rust-toolchain.toml, so they'd
      # land on a toolchain the build never uses. See the macOS step below.
      - uses: dtolnay/rust-toolchain@stable

      # macOS runners are Apple Silicon, so the pinned 1.96.0 toolchain only has
      # aarch64 by default; the Intel build needs x86_64 added to *that*
      # toolchain. Run from src-tauri/ so the rust-toolchain.toml override
      # applies and the target lands on 1.96.0. `rustup target add` is idempotent
      # and takes space-separated targets.
      - name: Add macOS cross-compile targets
        if: matrix.platform == 'macos-latest'
        working-directory: src-tauri
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (NOT OS code-signing). Required for self-update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Baked into the binary at compile time via option_env! (see lib.rs).
          # Add SPOTIFY_CLIENT_ID to the `release` environment in repo settings.
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Grimoire ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Emit latest.json (the updater manifest) and attach it to the release.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
